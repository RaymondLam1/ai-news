name: Daily AI News Update

on:
  schedule:
    # 每天 01:00 UTC = 北京时间 09:00，抓取最新内容
    - cron: '0 1 * * *'
  workflow_dispatch:   # 允许在 Actions 页面手动触发

permissions:
  contents: write      # 允许 workflow 写入仓库（commit & push）

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Fetch news & generate site
        run: uv run python fetch.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html reports/ data/
          # 只在有实际变更时才 commit
          if git diff --staged --quiet; then
            echo "Nothing changed, skipping commit."
          else
            git commit -m "chore: daily update $(date -u '+%Y-%m-%d')"
            git push
          fi
